name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: farmtest
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        env:
          APP_PORT: 8080
          DB_URL: jdbc:postgresql://localhost:5432/farmtest
          DB_USERNAME: test
          DB_PASSWORD: test
          SIGNER_KEY: test-secret-key-for-ci-at-least-32-chars
          EXPIRATION: 3600000
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: 587
          SMTP_MAIL: test@gmail.com
          SMTP_MAIL_PASSWORD: test
        run: mvn verify -B

      - name: Build Docker image (smoke check)
        run: docker build -t farmapp:ci .