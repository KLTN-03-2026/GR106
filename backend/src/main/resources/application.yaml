server:
  port: ${PORT:8080}

spring:
  application:
    name: farm-smart-management

  profiles:
    active: ${SPRING_PROFILES_ACTIVE}

  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true

#  mail:
#    host: ${SMTP_HOST:}
#    port: ${SMTP_PORT:587}
#    username: ${SMTP_MAIL}
#    password: ${SMTP_MAIL_PASSWORD}
#    properties:
#      mail:
#        smtp:
#          auth: true
#          starttls:
#            enable: true
#            required: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui

logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
    org.hibernate.SQL: WARN

app:
  front-end-url: ${FRONT_END_URL:http://localhost:3000}
  jwt:
    secret: ${SIGNER_KEY}
    expiration: ${EXPIRATION:3600000}
    refresh-expiration: 604800000

management:
  health:
    mail:
      enabled: false

payment:
  sepay:
    merchant-code: ${SEPAY_MERCHANT_CODE}
    secret-key: ${SEPAY_SECRET_KEY}
    payment-url: ${SEPAY_PAYMENT_URL}
    return-url: ${SEPAY_RETURN_URL}

sendgrid:
  api-key: ${SENDGRID_API_KEY}
  from-email: ${SENDGRID_FROM_EMAIL}
  from-name: ${SENDGRID_FROM_NAME:Farm Smart}