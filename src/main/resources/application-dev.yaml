spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  flyway:
    enabled: false
    locations: classpath:db/migration_dev

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        orm:
          jdbc:
            bind: TRACE

  data:
    redis:
      host: localhost
      port: 6379