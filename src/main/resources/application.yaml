server:
  port: ${PORT:8080}

spring:
  application:
    name: farm-smart-management

  profiles:
    active: dev

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_MAIL}
    password: ${SMTP_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
#      redis:
#        host: localhost
#        port: 6379
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui

logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
    org.hibernate.SQL: WARN

app:
  front-end-url: ${FRONT_END_URL:http://localhost:3000}
  jwt:
    secret: ${SIGNER_KEY}
    expiration: ${EXPIRATION:3600000}
    refresh-expiration: 604800000

management:
  health:
    mail:
      enabled: false


vnpay:
  tmn-code: ${VNPAY_TMN_CODE:YOUR_TMN_CODE}
  hash-secret: ${VNPAY_HASH_SECRET:YOUR_HASH_SECRET}

  # Sandbox (đổi sang production khi go-live)
  pay-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
  query-url: https://sandbox.vnpayment.vn/merchant_webapi/api/transaction

  # Backend nhận IPN từ VNPay (phải là public URL, VNPay gọi server-to-server)
  ipn-url: ${VNPAY_IPN_URL:https://your-api-domain.com/api/v1/payments/vnpay/ipn}

  # Frontend redirect sau khi thanh toán
  return-url: ${VNPAY_RETURN_URL:https://your-api-domain.com/api/v1/payments/vnpay/return}

  version: "2.1.0"
  command: pay
  curr-code: VND
  locale: vn
  expire-minutes: 15